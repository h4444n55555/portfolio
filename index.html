
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Hans - Portfolio</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Mrs+Saint+Delafield&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#171717",
                        "background-light": "#e2e8f0",
                        "background-dark": "#111d21",
                        "clay-white": "#e8edf2",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "display": ["Syne", "sans-serif"],
                        "body": ["Spline Sans", "sans-serif"],
                        "signature": ["Mrs Saint Delafield", "cursive"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem", 
                        "lg": "2rem", 
                        "xl": "3rem", 
                        "full": "9999px"
                    },
                    boxShadow: {
                        'clay-card': '8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff',
                        'clay-inset': 'inset 6px 6px 10px 0 #d1d9e6, inset -6px -6px 10px 0 #ffffff',
                        'clay-float': '12px 12px 24px #cbd5e0, -12px -12px 24px #ffffff',
                        'glass': '0 8px 32px 0 rgba( 31, 38, 135, 0.07 )',
                    },
                    backgroundImage: {
                        'grid-pattern': "linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px)",
                    },
                    backgroundSize: {
                        'grid-pattern': '40px 40px',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 1s ease-out forwards',
                        'marquee': 'marquee 10s linear infinite',
                        'scribble': 'drawStroke 1.5s ease-in-out forwards',
                        'signature': 'signatureWrite 2s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                        'typing': 'typing 2s steps(30, end) forwards',
                        'blink': 'blink 1s step-end infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-100%)' },
                        },
                        drawStroke: {
                            '0%': { strokeDashoffset: '1000' },
                            '100%': { strokeDashoffset: '0' },
                        },
                        signatureWrite: {
                            '0%': { clipPath: 'inset(0 100% 0 0)' },
                            '100%': { clipPath: 'inset(0 0 0 0)' },
                        },
                        typing: {
                            '0%': { width: '0' },
                            '100%': { width: '100%' },
                        },
                        blink: {
                            '0%, 100%': { borderColor: 'transparent' },
                            '50%': { borderColor: '#1e293b' }, // slate-800
                        }
                    }
                },
            },
        }
    </script>

    <!-- Custom CSS for complex effects -->
    <style>
        @keyframes float {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        @keyframes float-delayed {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(-30px, 50px) scale(0.9); }
            66% { transform: translate(20px, -20px) scale(1.1); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .liquid-blob-1 {
            animation: float 15s ease-in-out infinite;
        }
        .liquid-blob-2 {
            animation: float-delayed 18s ease-in-out infinite;
        }
        .clay-base {
            background-color: #f0f4f8;
            box-shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
            border-radius: 2rem;
            position: relative;
        }
        .clay-pressed {
            background-color: #f0f4f8;
            box-shadow: inset 6px 6px 10px 0 #d1d9e6, inset -6px -6px 10px 0 #ffffff;
            border-radius: 1rem;
        }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.35);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.05),
                inset 0 0 20px rgba(255, 255, 255, 0.8),
                inset 0 0 5px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 2rem;
            position: relative;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2rem;
        }
        .sidebar-panel {
            background: rgba(230, 234, 238, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .grid-bg-container {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: linear-gradient(to right, rgba(148, 163, 184, 0.15) 1px, transparent 1px), linear-gradient(to bottom, rgba(148, 163, 184, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
        }
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        h1, h2, h3, h4 {
            font-family: 'Inter', sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Crystal Component Styles */
        .crystal-container {
            perspective: 1000px;
        }
        .crystal-stack {
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .ribbed-bg {
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 4px,
                rgba(0, 0, 0, 0.03) 5px,
                transparent 6px
            );
        }
        .crystal-trigger {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 
                1px 1px 0px rgba(0, 0, 0, 0.1),
                2px 2px 0px rgba(0, 0, 0, 0.1),
                3px 3px 0px rgba(0, 0, 0, 0.1);
        }
        .crystal-trigger::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent 0px,
                transparent 6px,
                rgba(0, 0, 0, 0.02) 7px
            );
            pointer-events: none;
        }
        .social-grid-crystal {
            transform: translateY(-20px) rotateX(-20deg);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .crystal-container:hover .social-grid-crystal {
            opacity: 1;
            transform: translateY(0) rotateX(0);
            pointer-events: all;
        }
        .crystal-item {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        .crystal-item::after {
            content: "";
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 40px;
            background: repeating-linear-gradient(
                90deg,
                transparent 0px,
                transparent 3px,
                rgba(0, 0, 0, 0.02) 4px
            );
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 relative">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
